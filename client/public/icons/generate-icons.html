<!DOCTYPE html>
<html>
<body>
<script>
const sizes = [72,96,128,144,152,192,384,512];
sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  const gradient = ctx.createLinearGradient(0, 0, size, size);
  gradient.addColorStop(0, '#3b82f6');
  gradient.addColorStop(1, '#1d4ed8');
  ctx.fillStyle = gradient;
  ctx.roundRect(0, 0, size, size, size * 0.2);
  ctx.fill();

  // Icon chat bubble
  ctx.fillStyle = 'white';
  const s = size * 0.55;
  const x = (size - s) / 2;
  const y = (size - s) / 2 - size * 0.02;
  ctx.beginPath();
  ctx.roundRect(x, y, s, s * 0.75, s * 0.15);
  ctx.fill();

  // Tail
  ctx.beginPath();
  ctx.moveTo(x + s * 0.2, y + s * 0.75);
  ctx.lineTo(x + s * 0.05, y + s * 0.95);
  ctx.lineTo(x + s * 0.4, y + s * 0.75);
  ctx.fill();

  // Lines inside bubble
  ctx.fillStyle = '#3b82f6';
  [0.25, 0.42, 0.58].forEach((ratio, i) => {
    const lw = i === 2 ? s * 0.35 : s * 0.55;
    ctx.roundRect(
      x + s * 0.15, y + s * (0.18 + ratio * 0.5),
      lw, s * 0.07, s * 0.035
    );
    ctx.fill();
  });

  // Download
  const link = document.createElement('a');
  link.download = `icon-${size}x${size}.png`;
  link.href = canvas.toDataURL();
  link.click();
});
</script>
<p>Đang tạo icons... Kiểm tra Downloads folder</p>
</body>
</html>
